server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name sicher.local;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Señalizacion WebRTC/WHIP de la webcam: el navegador publica a
    # https://<dominio>/whip/<ruta>/whip y se reenvia a MediaMTX (puerto 8889).
    # La barra final en proxy_pass elimina el prefijo /whip/.
    # OJO: esto solo cubre la SEÑALIZACION. El MEDIA (video) viaja por UDP 8189
    # directo a la IP publica del EC2 -> abrir UDP 8189 en el Security Group y
    # poner la IP publica en webrtcAdditionalHosts (mediamtx.yml).
    location /whip/ {
        proxy_pass http://127.0.0.1:8889/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
