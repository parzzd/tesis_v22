<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Restablecer contrasena - Sicher</title>
<link rel="stylesheet" href="/static/login.css?v=responsive-20260517"/>
<script src="/config.js"></script>
</head>
<body>
<div class="wrap">
  <div class="shell">
    <div class="logo">
      <div class="badge">S</div>
      <h1>Sicher</h1>
    </div>

    <h2>Crear nueva contrasena</h2>
    <div id="msg" class="err"></div>

    <label>Nueva contrasena</label>
    <input id="password" type="password" class="in" placeholder="Minimo 6 caracteres" autocomplete="new-password"/>

    <label>Confirmar contrasena</label>
    <input id="password2" type="password" class="in" placeholder="Repita la contrasena" autocomplete="new-password"/>

    <button id="btn" class="btn mt-14">Guardar nueva contrasena</button>

    <div class="foot">
      <a href="/">Volver al inicio de sesion</a>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const apiUrl = path => (window.sicherApiUrl ? window.sicherApiUrl(path) : path);
const params = new URLSearchParams(window.location.search);
const token = params.get('token') || '';

function showMessage(text, ok = false) {
  const msg = $('#msg');
  msg.textContent = text;
  msg.classList.toggle('okbox', ok);
  msg.style.display = 'block';
}

async function submitReset() {
  const password = $('#password').value;
  const password2 = $('#password2').value;
  if (!token) {
    showMessage('El enlace no contiene token de restablecimiento.');
    return;
  }
  if (password.length < 6) {
    showMessage('La contrasena debe tener al menos 6 caracteres.');
    return;
  }
  if (password !== password2) {
    showMessage('Las contrasenas no coinciden.');
    return;
  }

  const btn = $('#btn');
  btn.disabled = true;
  try {
    const res = await fetch(apiUrl('/password-reset/confirm'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });
    const data = await res.json();
    const error = data.error || data.detail?.error;
    if (!res.ok) {
      showMessage(error || 'No se pudo actualizar la contrasena.');
      return;
    }
    showMessage(data.message || 'Contrasena actualizada.', true);
    setTimeout(() => { window.location.href = '/'; }, 1800);
  } catch (e) {
    showMessage('Error de conexion.');
  } finally {
    btn.disabled = false;
  }
}

$('#btn').onclick = submitReset;
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitReset();
});
</script>
</body>
</html>
