project:
  name: aggression_detection
  seed: 42

paths:
  archive_dir: .
  raw_dir: data/raw
  processed_dir: data/processed
  manifest_csv: data/processed/manifest.csv
  features_dir: data/features/yolo11s_pose_v2_seq32
  models_dir: models

datasets:
  - name: rwf2000
    archive: RWF-2000.zip
  - name: vioperu
    archive: VioPeru-main.zip
  - name: cctv
    archive: dataset.zip

yolo:
  model_name: yolo11s-pose.pt
  imgsz: 640
  conf: 0.25
  person_class_id: 0
  device: 0

features:
  sequence_length: 32
  min_frames: 4

ground_truth:
  use_cctv_segments: true
  include_cctv_background_segments: true
  min_background_seconds: 2.0
  max_background_segments_per_video: 2

lgbm:
  n_estimators: 600
  learning_rate: 0.03
  num_leaves: 31
  subsample: 0.9
  colsample_bytree: 0.9
  min_child_samples: 5
  min_data_in_bin: 2
  verbosity: -1
  random_state: 42

lstm:
  device: cpu
  hidden_size: 96
  num_layers: 2
  dropout: 0.25
  bidirectional: true
  batch_size: 32
  epochs: 30
  learning_rate: 0.001
  patience: 6

ensemble:
  lgbm_weight: 0.45
  lstm_weight: 0.55
  alert_threshold: 0.65

alert_smoothing:
  enabled: true
  window_size: 5
  min_alert_windows: 3
  cooldown_seconds: 15.0
  clear_windows: 3
  clear_threshold_offset: 0.08
